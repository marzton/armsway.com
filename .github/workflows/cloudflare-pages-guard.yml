name: Cloudflare Workers Guard

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  verify-worker-routes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - run: test -f ops/cloudflare-pages-required.json
      - name: Verify Cloudflare secrets are present
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          test -n "$CLOUDFLARE_API_TOKEN" || (echo "Missing CLOUDFLARE_API_TOKEN" && exit 1)
          test -n "$CLOUDFLARE_ACCOUNT_ID" || (echo "Missing CLOUDFLARE_ACCOUNT_ID" && exit 1)
      - name: Validate Worker routes and domains
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          python - <<'PY'
          import json, os, urllib.request
          def cf_get(url):
              req = urllib.request.Request(url, headers={'Authorization': f"Bearer {os.environ['CLOUDFLARE_API_TOKEN']}", 'Content-Type': 'application/json'})
              with urllib.request.urlopen(req, timeout=10) as resp:
                  data = json.loads(resp.read().decode())
              if not data.get('success'):
                  raise SystemExit(f"Cloudflare API error for {url}: {data}")
              return data['result']
          cfg = json.load(open('ops/cloudflare-pages-required.json', 'r', encoding='utf-8'))
          account = os.environ['CLOUDFLARE_ACCOUNT_ID']
          script = cfg['project_name']
          # Check Worker routes via supported zone-scoped endpoint, then filter by script
          zones = cf_get(f"https://api.cloudflare.com/client/v4/zones?account.id={account}&per_page=50")
          patterns = set()
          for zone in zones:
              zone_id = zone.get('id')
              if not zone_id:
                  continue
              zone_routes = cf_get(f"https://api.cloudflare.com/client/v4/zones/{zone_id}/workers/routes")
              for route in zone_routes:
                  if route.get('script') == script and route.get('pattern'):
                      patterns.add(route['pattern'])
          # Check custom domains (available in newer Workers API)
          try:
              domains_data = cf_get(f"https://api.cloudflare.com/client/v4/accounts/{account}/workers/scripts/{script}/domains")
              active_domains = {d['domain'] for d in domains_data}
          except Exception:
              active_domains = set()

          required = set(cfg.get('production_domains', []))
          missing = []
          for domain in required:
              pattern = f"{domain}/*"
              if pattern not in patterns and domain not in active_domains:
                  missing.append(domain)

          if missing:
              raise SystemExit(f"Missing required Worker routes/domains: {', '.join(missing)}")
          print('Cloudflare Workers guard passed.')
          PY
